<!DOCTYPE html>
<html>
    <head>
        <title>KRC</title>
        <link rel="stylesheet" href="home.css" type="text/css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="header container-fluid p-2 text-white" >
            <h2>KnowledgeFace</h2>
        </div>
        <div id="puzzle" >
            <div id="title"  style="margin: auto;">
                <center><h3>Entrepreneurs</h3></center>
            </div>
            <div id="box-container" style="margin: auto;">

            </div>
        </div>
      
    </body>
    <script type="text/javascript">
        var rows=10;
        var cols=10;
        var boxContainer=document.getElementById("box-container");
        var colors=["#ffe7c7","#acddde","#e1f8dc","#fef8dd","#ecafb4","#cddf97","#885c39"];
        boxContainer.style.width="500px";
        boxContainer.style.height="500px";
        for(var i=0;i<rows;i++)
        {
            let rowdiv=document.createElement("div");
            //rowdiv.style.border="1px solid #f3f3f3";
            rowdiv.style.display="flex";   
        for(var j=0;j<cols;j++)
        {
            let coldiv=document.createElement("div");
            let span=document.createElement("span");
            span.style.fontSize="15px";
            span.style.position="absolute";
            span.style.left="2px";
            span.style.top="2px";
            coldiv.style.border="1px solid #f1f1f1";
            coldiv.style.width=(boxContainer.style.width.slice(0,3)/cols)+"px";
            coldiv.style.height=(boxContainer.style.height.slice(0,3)/rows)+"px";
            if(i%2 == 0 || j%2 == 0)
            {
                coldiv.style.backgroundColor=colors[Math.floor((Math.random() * 7) + 0)];
            }
            else 
            {
            coldiv.innerText="a";
            span.innerText="1";
            }
            coldiv.style.fontSize="20px";
            coldiv.style.position="relative";
            coldiv.style.padding="15px";
            
            coldiv.appendChild(span);
            rowdiv.appendChild(coldiv);
        }
        boxContainer.appendChild(rowdiv);
        }
    </script>
</html>
