    <script type="text/javascript">
        
        var data=[['a','s','-','h','o','s','p','i','t','a','l','s'],['-','c','-','-','p','-','a','-','h','-','-','i'],['-','a','n','a','e','s','t','h','e','t','i','c'],['o','r','-','-','r','-','i','-','a','-','-','k'],['i','s','o','l','a','t','e','-','t','-','m'],['n','-','-','-','t','-','n','u','r','s','e','s'],['t','-','s','-','i','-','t','-','e','-','d','-'],['m','a','t','r','o','n','-','s','-','f','i','t'],['e','-','i','-','n','-','-','e','-','-','c','-'],['n','o','t','e','-','c','h','r','o','n','i','c'],['t','-','c','-','o','-','-','u','-','-','n','-'],['-','t','h','e','r','m','o','m','e','t','e','r']];
        var nums=[[0,0,1],[0,1,2],[0,3,3],[0,4,4],[0,6,5],[0,8,6],[0,11,7],[2,1,8],[3,0,9],[4,0,10],[4,10,11],[5,6,12],[6,2,13],[7,0,14],[7,7,15],[7,9,16],[9,0,17],[9,5,18],[10,4,19],[11,2,20]];

        var rows=12;
        var cols=12;
        var correct=1;
        var boxContainer=document.getElementById("box-container");
        var colors=["#ffe7c7","#acddde","#e1f8dc","#fef8dd","#ecafb4","#cddf97"];
        boxContainer.style.width="720px";
        boxContainer.style.height="720px";
        for(var i=0;i<rows;i++)
        {
            let rowdiv=document.createElement("div");
            rowdiv.style.display="flex";   
        for(var j=0;j<cols;j++)
        {
            let coldiv=document.createElement("div");
            let input=document.createElement("input");
            let span=document.createElement("span");
            span.style.fontSize="15px";
            span.style.position="absolute";
            span.style.left="2px";
            span.style.top="2px";
            coldiv.style.border="1px solid #f1f1f1";
            span.style.width="20px";
            span.style.height="20px";
            coldiv.style.width=(boxContainer.style.width.slice(0,3)/cols)+"px";
            coldiv.style.height=(boxContainer.style.height.slice(0,3)/rows)+"px";
            span.style.position="absolute";
            span.style.right="2px";
            span.style.bottom="2px";
            input.style.width="100%";
            input.style.border="none";
            input.setAttribute("type","text");
            input.setAttribute("onclick","this.select()");
            if(data[i][j]=='-')
            {
                let color= colors[Math.floor((Math.random() * 6) + 0)];
                coldiv.style.backgroundColor=color;
                input.setAttribute("disabled","true");
                input.style.backgroundColor=color;
            }
            else 
            {
                input.setAttribute("required","true");
                input.style.backgroundColor="white";
                
            }
            for(var c=0;c<nums.length;c++)
            {
                if(nums[c][0]==i && nums[c][1]==j )
                {
                    span.innerText=nums[c][2];

                }
            }
            coldiv.style.fontSize="20px";
            coldiv.style.position="relative";
            coldiv.style.padding="15px";
            coldiv.appendChild(span);
            coldiv.appendChild(input);
            coldiv.setAttribute("class","colbox");
            
            input.setAttribute("maxlength","1");
            input.setAttribute("minlength","1");
            input.setAttribute("onchange","checkbox(this,"+i+","+j+")");
            rowdiv.appendChild(coldiv);

        }
        boxContainer.appendChild(rowdiv);
        }
        function checkbox(ele,x,y)
        {
            let v=ele.value.toLowerCase()
            if(v !=data[x][y])
            {
                ele.parentNode.style.backgroundColor="red";
                ele.parentNode.style.color="white";
                ele.style.backgroundColor="red";
                ele.style.color="white";
                correct=0;

            }
            else 
            {
                ele.parentNode.style.backgroundColor="green";
                ele.parentNode.style.color="white";
                ele.style.backgroundColor="green";
                ele.style.color="white";
                correct=1;

            }
            ele.value=v;
        }
        function fill()
        {
            let rownodes = boxContainer.childNodes;
            for(var i=0;i<rows+1;i++)
            {
                
                let colnodes=rownodes[i+1].childNodes;
                for(var j=0;j<cols;j++)
                {
                    spaninputNode=colnodes[j].childNodes;
                    if(data[i][j] != "-")
                    {
                        spaninputNode[1].value=data[i][j];
                    }
                    
                }
            }
        }
